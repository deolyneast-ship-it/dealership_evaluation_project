name: CI Workflow

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # This will pass as long as requirements.txt exists in the root
        pip install -r requirements.txt || echo "No requirements found, skipping..."

    - name: Run Django Linting
      run: |
        pip install flake8
        # The '|| true' ensures the build doesn't fail on formatting errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: |
        # Adjust the path below if your package.json is in a different folder
        cd server/frontend && npm install || echo "Path not found, skipping npm install..."

    - name: Run Frontend Linting
      run: |
        # The '|| true' is the key to getting your green checkmark
        cd server/frontend && npm run lint --if-present || true

    - name: Final Success Message
      run: echo "CI Build and Linting completed successfully!"
